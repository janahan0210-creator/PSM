<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2c7a4b" />
  <meta name="description" content="GIS Field Data Collection PWA" />

  <title>GIS Field Collector</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f8;
      color: #333;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      background: #2c7a4b;
      color: #fff;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    #status-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s;
    }

    #status-badge.online  { background: #4caf50; }
    #status-badge.offline { background: #f44336; }

    /* ── Map ── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── Footer ── */
    footer {
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: #666;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Popup styling ── */
    .leaflet-popup-content strong {
      display: block;
      margin-bottom: 0.25rem;
      color: #2c7a4b;
    }

    .leaflet-popup-content span {
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1>📍 GIS Field Collector</h1>
    <span id="status-badge">Checking…</span>
  </header>

  <!-- ── Map Container ── -->
  <div id="map"></div>

  <!-- ── Footer ── -->
  <footer id="footer">Loading data…</footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs="
    crossorigin=""
  ></script>

  <script>
    /* ════════════════════════════════════════
       1. Service Worker Registration
    ════════════════════════════════════════ */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./service-worker.js')
          .then(reg => console.log('[SW] Registered, scope:', reg.scope))
          .catch(err => console.error('[SW] Registration failed:', err));
      });
    }

    /* ════════════════════════════════════════
       2. Online / Offline Status Badge
    ════════════════════════════════════════ */
    const badge = document.getElementById('status-badge');

    function updateStatus() {
      if (navigator.onLine) {
        badge.textContent = '🟢 Online';
        badge.className = 'online';
      } else {
        badge.textContent = '🔴 Offline';
        badge.className = 'offline';
      }
    }

    updateStatus();
    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);

    /* ════════════════════════════════════════
       3. Initialise Leaflet Map
    ════════════════════════════════════════ */
    const map = L.map('map', {
      center: [3.1390, 101.6869],   // Kuala Lumpur, Malaysia
      zoom: 12,
      zoomControl: true
    });

    // OpenStreetMap basemap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    /* ════════════════════════════════════════
       4. Custom Marker Icon
    ════════════════════════════════════════ */
    const fieldIcon = L.divIcon({
      className: '',
      html: `<div style="
        width:28px; height:28px;
        background:#2c7a4b;
        border:3px solid #fff;
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        box-shadow:0 2px 6px rgba(0,0,0,0.35);
      "></div>`,
      iconSize:   [28, 28],
      iconAnchor: [14, 28],
      popupAnchor:[0, -30]
    });

    /* ════════════════════════════════════════
       5. Load sample-data.json & Add Markers
    ════════════════════════════════════════ */
    const footer = document.getElementById('footer');

    fetch('./sample-data.json')
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(data => {
        const points = data.features;

        points.forEach(feature => {
          const { name, description, category } = feature.properties;
          const [lng, lat] = feature.geometry.coordinates;   // GeoJSON: [lon, lat]

          const marker = L.marker([lat, lng], { icon: fieldIcon }).addTo(map);

          marker.bindPopup(`
            <strong>${name}</strong>
            <span>${description}</span><br/>
            <span style="margin-top:4px;display:block;">
              🏷️ ${category}<br/>
              📌 ${lat.toFixed(5)}, ${lng.toFixed(5)}
            </span>
          `);
        });

        footer.textContent =
          `✅ ${points.length} field point${points.length !== 1 ? 's' : ''} loaded`;
      })
      .catch(err => {
        console.error('[Data] Failed to load sample-data.json:', err);
        footer.textContent = '⚠️ Could not load field data.';
      });
  </script>

</body>
</html>
